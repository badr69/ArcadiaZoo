{% extends "base.html" %}

{% block title %}Home page{%  endblock %}


{% block content %}

    <form method="POST" action="{{ url_for('index') }}">
    {{ form.csrf_token }}
    <p>
        {{ form.name.label }} <br> {{ form.name(size=20) }}
    </p>
    <p>
        {{ form.message.label }} <br> {{ form.message(size=20) }}
    </p>
       {{ form.submit }}
</form>

{% endblock %}
